<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>JPY ➡️ RM 转换器</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5169/5169120.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5169/5169120.png">

    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #121212; color: white; margin: 0; overflow: hidden; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 85%; max-width: 350px; }
        h2 { margin-bottom: 20px; font-weight: 300; letter-spacing: 1px; }
        input { width: 90%; padding: 15px; margin: 15px 0; font-size: 22px; text-align: center; border: none; border-radius: 12px; background: #2c2c2c; color: white; outline: none; }
        #result { font-size: 32px; font-weight: bold; margin-top: 20px; color: #00d1b2; }
        #rateInfo { font-size: 13px; color: #888; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🇯🇵 JPY ➡️ RM 🇲🇾</h2>
        <input type="number" id="jpyAmount" placeholder="输入日元金额" oninput="convert()">
        <div id="result">RM 0.00</div>
        <p id="rateInfo">正在获取最新汇率...</p>
    </div>

    <script>
        let currentRate = 0;
        // 自动获取最新汇率
        fetch('https://open.er-api.com/v6/latest/JPY')
            .then(res => res.json())
            .then(data => {
                currentRate = data.rates.MYR;
                document.getElementById('rateInfo').innerText = `实时汇率：100 JPY ≈ RM ${(currentRate * 100).toFixed(2)}`;
            })
            .catch(() => document.getElementById('rateInfo').innerText = "网络连接失败");

        function convert() {
            let amount = document.getElementById('jpyAmount').value;
            if(amount && currentRate) {
                document.getElementById('result').innerText = 'RM ' + (amount * currentRate).toFixed(2);
            } else {
                document.getElementById('result').innerText = 'RM 0.00';
            }
        }
    </script>
</body>
</html>
